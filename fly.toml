app = "abs-recap"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  WEB_CONCURRENCY = "1"
  GUNICORN_THREADS = "4"

[processes]
  app = "gunicorn -w ${WEB_CONCURRENCY} -k gthread --threads ${GUNICORN_THREADS} -b 0.0.0.0:8080 app:app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
